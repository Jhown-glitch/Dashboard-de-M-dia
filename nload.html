    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
            background-color: #1c2341;
            color: #7de37c;
            font-family: Arial, sans-serif;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #ffffff;
            opacity: 0.7;
        }
    </style>
    <title>Não Carregado</title>
</head>
<body>
    <h1>Não Carregado</h1>
    <p>Você ainda não carregou nenhum conteúdo.</p>

</html>
